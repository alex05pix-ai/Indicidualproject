<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Сравнение квартир Красноярска{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">
            🏙️ Сравнение квартир · Красноярск
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="{{ url_for('index') }}">Новый поиск</a>
            <a class="nav-link text-white" href="{{ url_for('history') }}">История</a>
        </div>
    </div>
</nav>

<main class="container pb-5">
    {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted small py-3">
    Образовательный проект. Использование парсера должно соответствовать
    пользовательскому соглашению Avito.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
