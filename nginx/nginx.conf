# ============================================
# Nginx конфигурация для Квартира-Компаратор
# Проксирование Flask + WebSocket + SSL + Security
# ============================================

# Rate limiting зона
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

# Upstream для приложения
upstream app_server {
    server app:5000;
}

# Перенаправление HTTP -> HTTPS (если используется SSL)
server {
    listen 80;
    server_name ${DOMAIN_NAME:-localhost};

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Если нет SSL — проксируем напрямую
    location / {
        # Раскомментируйте для принудительного HTTPS:
        # return 301 https://$host$request_uri;

        # Без SSL — проксируем напрямую
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Лимит запросов
        limit_req zone=general burst=20 nodelay;
    }

    # WebSocket проксирование
    location /socket.io {
        proxy_pass http://app_server/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Статические файлы — отдача напрямую
    location /static/ {
        alias /app/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # Лимиты
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
}

