# =============================================================================
# Avito Comparator — Nginx config
#
# Возможности:
# - Проксирование HTTP -> Flask/Gunicorn (контейнер `app`).
# - Поддержка WebSocket (для прогресс-бара через Socket.IO).
# - Отдача статических файлов через app-апстрим (с агрессивным кешем).
# - Заголовки безопасности (HSTS добавляется только в HTTPS-server-блоке).
# - Лимиты на размер запроса и rate limiting.
# - HTTP -> HTTPS редирект, ACME-challenge для Let's Encrypt.
#
# Если вы запускаете без домена (по IP) — используйте только HTTP-блок,
# закомментировав HTTPS-блок ниже.
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Логирование ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Базовые настройки ----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 4m;
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ---------- Сжатие ----------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_min_length     1024;
    gzip_comp_level     5;
    gzip_types          text/plain text/css application/json application/javascript
                        application/manifest+json text/xml application/xml
                        application/xml+rss text/javascript image/svg+xml;

    # ---------- Rate limiting ----------
    limit_req_zone  $binary_remote_addr zone=api_zone:10m rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=search_zone:10m rate=1r/s;

    # ---------- WebSocket upgrade map ----------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream app_upstream {
        server app:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =========================================================================
    # HTTP server (порт 80)
    # Используется как:
    #   - основной сервер при запуске без домена (на VPS по IP);
    #   - редирект на HTTPS, когда сертификаты выпущены.
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name ${NGINX_SERVER_NAME};

        # ACME-challenge для Let's Encrypt — должен быть выше других правил.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        # Включаем общие правила проксирования.
        # При наличии HTTPS раскомментируйте `return 301` ниже и удалите include.
        # return 301 https://$host$request_uri;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # =========================================================================
    # HTTPS server (порт 443) — раскомментируйте после выпуска сертификата.
    # =========================================================================
    # server {
    #     listen 443 ssl;
    #     listen [::]:443 ssl;
    #     http2 on;
    #     server_name ${NGINX_SERVER_NAME};
    #
    #     ssl_certificate     /etc/letsencrypt/live/${NGINX_SERVER_NAME}/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/${NGINX_SERVER_NAME}/privkey.pem;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    #     ssl_prefer_server_ciphers off;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     include /etc/nginx/conf.d/proxy.inc;
    # }
}
