# ============================================
# Render.com — Deployment Configuration
# Квартира-Компаратор
# ============================================

services:
  - type: web
    name: kvartira-comparator
    runtime: python
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: APP_SECRET_KEY
        generateValue: true
