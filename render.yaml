# Render.com — Python runtime (без Docker)
services:
  - type: web
    name: kvartira-comparator
    runtime: python
    plan: free
    region: frankfurt
    branch: feature/kvartira-comparator
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT --timeout 120 app.main:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_DATABASE_URL
        value: "sqlite:///data/app.db"
