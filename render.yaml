# ============================================
# Render.com конфигурация деплоя
# Автоматический деплой при пуше в main
# ============================================

services:
  - type: web
    name: kvartira-comparator
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "5000"
      - key: APP_DEBUG
        value: "false"
      - key: APP_DATABASE_URL
        value: "sqlite:///data/app.db"
      - key: APP_LOG_LEVEL
        value: "INFO"
      - key: APP_PASSWORD
        sync: false  # Задать вручную в панели Render
      - key: DOMAIN_NAME
        sync: false  # Опционально
    disk:
      name: kvartira-data
      mountPath: /app/data
      sizeGB: 1
