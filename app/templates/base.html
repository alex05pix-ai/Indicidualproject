<!doctype html>
<html lang="ru" data-bs-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d6efd">
  <meta name="description" content="Сравнение цен на квартиры в {{ city_display }} по данным Avito.">
  <title>{% block title %}Avito Comparator — {{ city_display }}{% endblock %}</title>

  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='55%25' font-size='80' text-anchor='middle' dominant-baseline='middle'>🏠</text></svg>">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-md sticky-top bg-body-tertiary border-bottom">
    <div class="container-xl">
      <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">
        🏠 Avito Comparator <span class="text-secondary fw-normal">· {{ city_display }}</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-md-center gap-1">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index') }}">Поиск</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('history') }}">История</a>
          </li>
          <li class="nav-item">
            <button id="theme-toggle" type="button" class="btn btn-outline-secondary btn-sm ms-md-2"
                    aria-label="Переключить тему">
              <span data-theme-icon-light>☀️</span>
              <span data-theme-icon-dark hidden>🌙</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-xl py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="container-xl text-secondary small py-4 border-top mt-5">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-2">
      <span>© Avito Comparator. Использование парсера в образовательных целях.</span>
      <span>Данные: avito.ru · Геокодирование: OpenStreetMap Nominatim</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"
          integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
          integrity="sha384-bAfgomLO9wTU6mWPfQHbLDhlbTbJZpKwSsxGQ49mh8K6Q2hH9sJtGQiJKHN5e6Tw"
          crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
