# ============================================
# Fly.io конфигурация деплоя
# Деплой: fly deploy
# ============================================

app = "kvartira-comparator"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  APP_HOST = "0.0.0.0"
  APP_PORT = "8080"
  APP_DEBUG = "false"
  APP_DATABASE_URL = "sqlite:///data/app.db"
  APP_LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "10s"

[mounts]
  source = "kvartira_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
